<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Regioes - Pokédex</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        :root { --pokemon-red:#DC143C; --pokemon-yellow:#FFD700; --pokemon-blue:#1E90FF; --pokemon-black:#1a1a1a; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);min-height:100vh;color:#333}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 50%,rgba(220,20,60,.05) 0%,transparent 50%),radial-gradient(circle at 80% 50%,rgba(30,144,255,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
        .navbar{background:linear-gradient(90deg,var(--pokemon-red) 0%,#C71E1E 100%);box-shadow:0 8px 32px rgba(220,20,60,.3);padding:1rem 0;border-bottom:4px solid var(--pokemon-yellow);position:sticky;top:0;z-index:100}
        .navbar-brand{font-weight:800;font-size:28px;color:white!important;letter-spacing:1px;display:flex;align-items:center;gap:12px;text-transform:uppercase}
        .nav-links{margin-left:auto;display:flex;gap:20px;flex-wrap:wrap}
        .nav-links a{color:white;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:5px}
        .nav-links a:hover{color:var(--pokemon-yellow)}
        .container-main{max-width:1400px;margin:40px auto;padding:0 20px;position:relative;z-index:1}
        .page-header,.controls-section{background:rgba(255,255,255,.95);border-radius:20px;padding:40px;margin-bottom:40px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .page-header h1{color:var(--pokemon-red);font-weight:800;font-size:48px;margin-bottom:15px}
        .page-header p{font-size:18px;color:#555}
        .section-title{font-weight:700;font-size:18px;color:var(--pokemon-red);margin-bottom:20px;display:flex;align-items:center;gap:10px}
        .search-input{width:100%;max-width:420px;padding:12px 15px;border:2px solid #ddd;border-radius:10px;font-family:'Poppins',sans-serif}
        .search-input:focus{border-color:var(--pokemon-red);box-shadow:0 0 0 3px rgba(220,20,60,.1);outline:none}
        .regions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;margin-bottom:40px;animation:fadeIn .6s ease}
        .region-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.12);transition:.35s ease;border:3px solid transparent;cursor:pointer}
        .region-card:hover{transform:translateY(-10px);box-shadow:0 20px 48px rgba(0,0,0,.2);border-color:var(--pokemon-red)}
        .region-header{background:linear-gradient(135deg,#F5F5F5 0%,#EFEFEF 100%);padding:24px 18px;text-align:center}
        .region-icon{font-size:46px;margin-bottom:8px}
        .region-name{font-size:24px;font-weight:700;color:var(--pokemon-black);text-transform:capitalize}
        .region-content{padding:18px}
        .region-stat{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #eee}
        .region-stat:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
        .stat-label{font-size:12px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .stat-value{font-size:15px;font-weight:700;color:var(--pokemon-red);text-transform:capitalize}
        .loading{text-align:center;padding:60px 20px;color:white}
        .loading-spinner{display:inline-block;width:60px;height:60px;border:5px solid rgba(255,255,255,.3);border-top:5px solid white;border-radius:50%;animation:spin 1s linear infinite}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;overflow-y:auto}
        .modal-overlay.active{display:flex;align-items:center;justify-content:center}
        .modal-content{background:white;border-radius:20px;max-width:900px;width:92%;max-height:90vh;overflow-y:auto}
        .modal-header{background:linear-gradient(135deg,var(--pokemon-red) 0%,#C71E1E 100%);color:white;padding:25px;display:flex;justify-content:space-between;align-items:center;border-radius:20px 20px 0 0}
        .modal-header h2{margin:0;font-size:28px;font-weight:800;text-transform:capitalize}
        .modal-close{background:rgba(255,255,255,.2);border:none;color:white;font-size:28px;width:40px;height:40px;border-radius:50%}
        .modal-body{padding:30px}
        .modal-section{margin-bottom:28px;padding-bottom:28px;border-bottom:2px solid #eee}
        .modal-section:last-child{border-bottom:none}
        .modal-section-title{font-size:18px;font-weight:700;color:var(--pokemon-red);margin-bottom:15px;display:flex;align-items:center;gap:10px}
        .modal-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:15px}
        .info-item{background:rgba(220,20,60,.05);padding:15px;border-radius:10px;border-left:3px solid var(--pokemon-red)}
        .info-label{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;margin-bottom:5px}
        .info-value{font-size:16px;font-weight:700;color:var(--pokemon-black);text-transform:capitalize}
        .list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
        .list-item{background:white;border:2px solid #ddd;padding:10px;border-radius:8px;text-align:center;text-transform:capitalize;font-size:12px;font-weight:600;color:var(--pokemon-black)}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @media (max-width:768px){.page-header h1{font-size:32px}.regions-grid{grid-template-columns:1fr}.modal-grid{grid-template-columns:1fr}.nav-links{margin-left:0}}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand" style="text-decoration:none;"><i class="material-icons">circle</i>Pokédex</a>
            <div class="nav-links">
                <a href="index.html"><i class="material-icons">search</i> Explorar</a>
                <a href="explorer-types.html"><i class="material-icons">label</i> Tipos</a>
                <a href="explorer-moves.html"><i class="material-icons">flash_on</i> Movimentos</a>
                <a href="explorer-abilities.html"><i class="material-icons">psychology</i> Habilidades</a>
                <a href="explorer-items.html"><i class="material-icons">shopping_bag</i> Itens</a>
                <a href="explorer-regions.html"><i class="material-icons">map</i> Regioes</a>
                <a href="explorer-generations.html"><i class="material-icons">history</i> Geracoes</a>
            </div>
        </div>
    </nav>

    <div class="container-main">
        <div class="page-header">
            <h1><i class="material-icons" style="font-size:48px;">map</i> Explorador de Regioes</h1>
            <p>Veja a regiao principal, quantidade de localidades, pokedexes e grupos de versao.</p>
        </div>

        <div class="controls-section">
            <div class="section-title"><i class="material-icons">search</i> Buscar Regiao</div>
            <input type="text" id="searchInput" class="search-input" placeholder="Digite o nome da regiao...">
        </div>

        <div id="regionsContainer" class="regions-grid"><div class="loading"><div class="loading-spinner"></div><p style="margin-top:20px;">Carregando regioes...</p></div></div>
    </div>

    <div id="regionModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="regionModalTitle">
            <div class="modal-header">
                <div>
                    <h2 id="regionModalTitle">Regiao</h2>
                    <div id="regionModalSubtitle" style="font-size:14px;font-weight:600;opacity:.9;margin-top:6px;"></div>
                </div>
                <button class="modal-close" type="button" id="closeRegionModal">&times;</button>
            </div>
            <div id="regionModalBody" class="modal-body"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'https://pokeapi.co/api/v2/';
        let allRegions = [];
        const regionModal = document.getElementById('regionModal');
        const regionModalTitle = document.getElementById('regionModalTitle');
        const regionModalSubtitle = document.getElementById('regionModalSubtitle');
        const regionModalBody = document.getElementById('regionModalBody');

        async function loadRegions() {
            try {
                const response = await fetch(`${API_URL}region/`);
                const data = await response.json();
                const promises = data.results.map(region => fetch(`${API_URL}region/${region.name}`).then(r => r.json()));
                allRegions = await Promise.all(promises);
                displayRegions(allRegions);
            } catch (error) {
                document.getElementById('regionsContainer').innerHTML = `<div class="alert alert-danger">Erro ao carregar regioes: ${error.message}</div>`;
            }
        }

        function displayRegions(regions) {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = regions.filter(region => region.name.includes(searchTerm));
            const container = document.getElementById('regionsContainer');

            if (!filtered.length) {
                container.innerHTML = '<div class="alert alert-warning">Nenhuma regiao encontrada.</div>';
                return;
            }

            container.innerHTML = filtered.map(region => `
                <div class="region-card" onclick="openRegionModal('${region.name}')">
                    <div class="region-header">
                        <div class="region-icon">🗺️</div>
                        <div class="region-name">${region.name}</div>
                    </div>
                    <div class="region-content">
                        <div class="region-stat"><div class="stat-label">Generation</div><div class="stat-value">${region.main_generation?.name || 'N/A'}</div></div>
                        <div class="region-stat"><div class="stat-label">Locations</div><div class="stat-value">${region.locations.length}</div></div>
                        <div class="region-stat"><div class="stat-label">Pokedexes</div><div class="stat-value">${region.pokedexes.length}</div></div>
                        <div class="region-stat"><div class="stat-label">Version Groups</div><div class="stat-value">${region.version_groups.length}</div></div>
                    </div>
                </div>
            `).join('');
        }

        function openRegionModal(regionName) {
            const region = allRegions.find(r => r.name === regionName);
            if (!region) return;

            regionModalTitle.textContent = region.name;
            regionModalSubtitle.textContent = `Main generation: ${region.main_generation?.name || 'N/A'}`;
            regionModalBody.innerHTML = `
                <div class="modal-section">
                    <div class="modal-grid">
                        <div class="info-item"><div class="info-label">Name</div><div class="info-value">${region.name}</div></div>
                        <div class="info-item"><div class="info-label">Main Generation</div><div class="info-value">${region.main_generation?.name || 'N/A'}</div></div>
                        <div class="info-item"><div class="info-label">Locations</div><div class="info-value">${region.locations.length}</div></div>
                        <div class="info-item"><div class="info-label">Pokedexes</div><div class="info-value">${region.pokedexes.length}</div></div>
                    </div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title"><i class="material-icons">place</i> Locations</div>
                    <div class="list-grid">${region.locations.map(location => `<div class="list-item">${location.name}</div>`).join('')}</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title"><i class="material-icons">book</i> Pokedexes</div>
                    <div class="list-grid">${region.pokedexes.map(pokedex => `<div class="list-item">${pokedex.name}</div>`).join('')}</div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title"><i class="material-icons">swap_horiz</i> Version Groups</div>
                    <div class="list-grid">${region.version_groups.map(group => `<div class="list-item">${group.name}</div>`).join('')}</div>
                </div>
            `;
            regionModal.classList.add('active');
            regionModal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeRegionModal() {
            regionModal.classList.remove('active');
            regionModal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        document.getElementById('searchInput').addEventListener('input', () => displayRegions(allRegions));
        document.getElementById('closeRegionModal').addEventListener('click', closeRegionModal);
        regionModal.addEventListener('click', e => { if (e.target === regionModal) closeRegionModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape' && regionModal.classList.contains('active')) closeRegionModal(); });
        loadRegions();
    </script>
</body>
</html>
